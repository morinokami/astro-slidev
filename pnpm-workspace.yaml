packages:
  - packages/*
  - playground

catalogMode: prefer

catalog:
  "@astrojs/compiler": 4.0.0
  "@slidev/cli": 52.15.0
  "@slidev/theme-default": 0.25.0
  "@slidev/theme-seriph": 0.25.0
  "@types/node": 24.12.2
  astro: 6.2.1
  vite: 8.0.10
  vitest: 4.1.5
  vite-plus: 0.1.20
  vue: 3.5.33
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
